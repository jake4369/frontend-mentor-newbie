<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Product preview card component</title>
  </head>
  <body>
    <main class="flex-container">
      <picture>
        <source
          media="(min-width: 768px)"
          srcset="images/image-product-desktop.jpg"
        />
        <img src="images/image-product-mobile.jpg" alt="Product image" />
      </picture>

      <section class="section__product-info">
        <a href="#" class="category-link__prefume">perfume</a>

        <h1 class="product-name">Gabrielle Essence Eau De Parfum</h1>

        <p class="product-info">
          A floral, solar and voluptuous interpretation composed by Olivier
          Polge, Perfumer-Creator for the House of CHANEL.
        </p>

        <div class="price-container">
          <span class="current-price">$149.99</span>
          <span class="previous-price">$169.99</span>
        </div>

        <div class="btn__add-to-cart">Add to Cart</div>
      </section>
    </main>
  </body>
</html>
