<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="index.css" />

    <title>Interactive rating component</title>
  </head>
  <body>
    <main>
      <div class="star-container">
        <img src="images/icon-star.svg" alt="Star icon" class="star-icon" />
      </div>

      <div class="text-content">
        <h1>How did we do?</h1>

        <p>
          Please let us know how we did with your support request. All feedback
          is appreciated to help us improve our offering!
        </p>
      </div>

      <div class="radio-toolbar" id="radio-toolbar">
        <input
          type="radio"
          id="radioOne"
          name="radioRating"
          value="1"
          checked
        />
        <label for="radioOne">1</label>

        <input type="radio" id="radioTwo" name="radioRating" value="two" />
        <label for="radioTwo">2</label>

        <input type="radio" id="radioThree" name="radioRating" value="3" />
        <label for="radioThree">3</label>

        <input type="radio" id="radioFour" name="radioRating" value="4" />
        <label for="radioFour">4</label>

        <input type="radio" id="radioFive" name="radioRating" value="5" />
        <label for="radioFive">5</label>
      </div>

      <button class="submit-btn" id="submit-btn">SUBMIT</button>

      <!-- THANK YOU -->
      <!-- <img
        src="images/illustration-thank-you.svg"
        alt=""
        class="illustration"
      />

      <h2>Thank you!</h2>

      <p>
        We appreciate you taking the time to give a rating. If you ever need
        more support, don’t hesitate to get in touch!
      </p> -->

      <script src="index.js"></script>
    </main>
  </body>
</html>
